<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric Pulsing Heart</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #080808; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const offscreen = document.createElement('canvas');
        const offCtx = offscreen.getContext('2d');

        const P1_DUR = 2000;
        const P2_DUR = 1400;
        const P3_DUR = 15000;
        const TOTAL_DUR = P1_DUR + P2_DUR + P3_DUR;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            offscreen.width = canvas.width;
            offscreen.height = canvas.height;
        }

        window.addEventListener('resize', resize);
        resize();

        function getHeartPoint(t, scale) {
            // Parametric Equation: x = 16sin³(t), y = 13cos(t)-5cos(2t)-2cos(3t)-cos(4t)
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * scale, y: y * scale };
        }

        function drawHeartPath(c, scale, cx, cy) {
            c.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.02) {
                const p = getHeartPoint(t, scale);
                if (t === 0) c.moveTo(cx + p.x, cy + p.y);
                else c.lineTo(cx + p.x, cy + p.y);
            }
            c.closePath();
        }

        function render(time) {
            const elapsed = time % TOTAL_DUR;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const baseScale = Math.min(canvas.width, canvas.height) / 45;

            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (elapsed < P1_DUR) {
                // Phase 1: Outlines
                const numRings = 8;
                for (let i = 0; i < numRings; i++) {
                    const delay = i * 120;
                    const ringElapsed = elapsed - delay;
                    if (ringElapsed > 0) {
                        const decay = Math.exp(-ringElapsed / 250);
                        const s = baseScale * (0.5 + (i * 0.72 / 7));
                        ctx.save();
                        ctx.shadowBlur = 70 * decay;
                        ctx.shadowColor = `rgba(255, 40, 150, ${decay})`;
                        ctx.strokeStyle = `rgba(255, 120, 200, ${0.4 + 0.6 * decay})`;
                        ctx.lineWidth = (numRings - i) * 1.5;
                        drawHeartPath(ctx, s, cx, cy);
                        ctx.stroke();
                        ctx.strokeStyle = `rgba(255, 230, 240, ${decay})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            } else {
                // Phase 2 & 3: Dots and Pulsing
                let pulseScale = 1.0;
                let p2Progress = 1.0;

                if (elapsed < P1_DUR + P2_DUR) {
                    const t = (elapsed - P1_DUR) / P2_DUR;
                    p2Progress = 1 - Math.pow(1 - t, 3);
                } else {
                    const p3Norm = ((elapsed - P1_DUR - P2_DUR) / 5000) % 1;
                    pulseScale = 0.7 + (Math.sin(p3Norm * Math.PI) * 0.55);
                }

                const s = baseScale * pulseScale;
                offCtx.clearRect(0, 0, canvas.width, canvas.height);
                offCtx.save();
                drawHeartPath(offCtx, s, cx, cy);
                offCtx.clip();

                const dotSpacing = 6;
                const revealLimit = 25 * baseScale * p2Progress;
                for (let x = -20 * s; x < 20 * s; x += dotSpacing) {
                    for (let y = -20 * s; y < 20 * s; y += dotSpacing) {
                        const dist = Math.sqrt(x*x + y*y);
                        if (dist < revealLimit) {
                            const colorDist = dist / (20 * s);
                            offCtx.fillStyle = `rgb(255, ${150 - colorDist * 80}, ${210 - colorDist * 80})`;
                            offCtx.fillRect(cx + x, cy + y, 3, 3);
                        }
                    }
                }
                offCtx.restore();

                if (elapsed > P1_DUR + P2_DUR) {
                    const glowIntensity = (pulseScale - 0.7) / 0.55;
                    const radii = [0.22, 0.09, 0.035];
                    radii.forEach((r, i) => {
                        ctx.save();
                        ctx.filter = `blur(${s * r}px)`;
                        ctx.globalAlpha = [0.2, 0.4, 0.6][i] * glowIntensity;
                        ctx.drawImage(offscreen, 0, 0);
                        ctx.restore();
                    });
                }
                ctx.drawImage(offscreen, 0, 0);
            }
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    </script>
</body>
</html>
