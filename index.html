<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric Pulsing Heart</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #080808; width: 100%; height: 100%; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        // Memory canvases for performance
        const dotCache = document.createElement('canvas');
        const dCtx = dotCache.getContext('2d');
        const glowCache = document.createElement('canvas');
        const gCtx = glowCache.getContext('2d');

        const P1_DUR = 2000;  
        const P2_DUR = 1400;  
        const P3_DUR = 15000; 
        const TOTAL_DUR = P1_DUR + P2_DUR + P3_DUR;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Pre-calculate the dot heart at a large fixed size
            setupCache();
        }

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * scale, y: y * scale };
        }

        function drawHeartPath(c, scale, cx, cy) {
            c.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.02) {
                const p = getHeartPoint(t, scale);
                if (t === 0) c.moveTo(cx + p.x, cy + p.y);
                else c.lineTo(cx + p.x, cy + p.y);
            }
            c.closePath();
        }

        function setupCache() {
            const size = 800; // High resolution base
            dotCache.width = size;
            dotCache.height = size;
            const sc = size / 45;
            const mid = size / 2;

            dCtx.clearRect(0, 0, size, size);
            dCtx.save();
            drawHeartPath(dCtx, sc, mid, mid);
            dCtx.clip();

            const spacing = 1.8;
            for (let x = -22 * sc; x < 22 * sc; x += spacing) {
                for (let y = -22 * sc; y < 22 * sc; y += spacing) {
                    const dist = Math.sqrt(x*x + y*y) / (22 * sc);
                    dCtx.fillStyle = `rgb(255, ${150 - dist * 80}, ${210 - dist * 80})`;
                    dCtx.fillRect(mid + x, mid + y, 1.5, 1.5);
                }
            }
            dCtx.restore();
        }

        function animate(time) {
            const elapsed = time % TOTAL_DUR;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const baseScale = Math.min(canvas.width, canvas.height) / 45;

            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (elapsed < P1_DUR) {
                const numRings = 8;
                for (let i = 0; i < numRings; i++) {
                    const delay = i * 140; 
                    const rElapsed = elapsed - delay;
                    if (rElapsed > 0) {
                        const decay = Math.exp(-rElapsed / 180);
                        const s = baseScale * (0.5 + (i * 0.09));
                        ctx.save();
                        ctx.shadowBlur = 40 * decay;
                        ctx.shadowColor = `rgba(255, 40, 150, ${decay})`;
                        ctx.strokeStyle = `rgba(255, 100, 180, ${0.2 + 0.8 * decay})`;
                        ctx.lineWidth = 0.8;
                        drawHeartPath(ctx, s, cx, cy);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            } else {
                let scale = 1.0;
                let progress = 1.0;

                if (elapsed < P1_DUR + P2_DUR) {
                    progress = 1 - Math.pow(1 - (elapsed - P1_DUR) / P2_DUR, 3);
                } else {
                    const p3Norm = ((elapsed - P1_DUR - P2_DUR) / 5000) % 1;
                    scale = 0.7 + (Math.sin(p3Norm * Math.PI) * 0.55);
                }

                const finalSize = baseScale * scale * 45 * 1.2; 
                
                ctx.save();
                if (elapsed > P1_DUR + P2_DUR) {
                    // Optimized Glow: Single shadow pass instead of multi-blur
                    ctx.shadowBlur = 50 * ((scale - 0.7) / 0.55);
                    ctx.shadowColor = 'rgba(255, 40, 150, 0.8)';
                }
                
                // Mask for Phase 2 reveal
                if (progress < 1.0) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, progress * 400, 0, Math.PI * 2);
                    ctx.clip();
                }

                ctx.drawImage(dotCache, cx - finalSize/2, cy - finalSize/2, finalSize, finalSize);
                ctx.restore();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
